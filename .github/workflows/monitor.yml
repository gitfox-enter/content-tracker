name: 线报监控

on:
  schedule:
    # 每30分钟运行两次（batch 1 和 batch 2）
    - cron: '0,30 * * * *'
  workflow_dispatch:
    inputs:
      batch:
        description: '批次 (1 或 2)'
        required: false
        default: '1'

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: 运行监控 (Batch 1)
        if: github.event_name == 'schedule' || github.event.inputs.batch == '1'
        env:
          TZ: Asia/Shanghai
          CLAWEMAIL_API_KEY: ${{ secrets.CLAWEMAIL_API_KEY }}
          CLAWEMAIL_USER: ${{ secrets.CLAWEMAIL_USER }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: python monitor.py --batch 1

      - name: 运行监控 (Batch 2)
        if: github.event_name == 'schedule' || github.event.inputs.batch == '2'
        env:
          TZ: Asia/Shanghai
          CLAWEMAIL_API_KEY: ${{ secrets.CLAWEMAIL_API_KEY }}
          CLAWEMAIL_USER: ${{ secrets.CLAWEMAIL_USER }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: python monitor.py --batch 2

      - name: 保存 hashes（有变更时提交）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hashes.json
          git diff --cached --quiet || git commit -m "🔄 更新 hashes $(date +%m/%d-%H:%M)"
          git push