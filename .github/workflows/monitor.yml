name: Content Monitor

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:
    inputs:
      batch:
        description: 'Batch number (1 or 2)'
        required: false
        default: '1'

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run monitor (Batch 1)
        if: github.event_name == 'schedule' || github.event.inputs.batch == '1'
        env:
          TZ: Asia/Shanghai
          SITES_CONFIG: ${{ secrets.SITES_CONFIG }}
          CLAWEMAIL_API_KEY: ${{ secrets.CLAWEMAIL_API_KEY }}
          CLAWEMAIL_USER: ${{ secrets.CLAWEMAIL_USER }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: python monitor.py --batch 1

      - name: Run monitor (Batch 2)
        if: github.event_name == 'schedule' || github.event.inputs.batch == '2'
        env:
          TZ: Asia/Shanghai
          SITES_CONFIG: ${{ secrets.SITES_CONFIG }}
          CLAWEMAIL_API_KEY: ${{ secrets.CLAWEMAIL_API_KEY }}
          CLAWEMAIL_USER: ${{ secrets.CLAWEMAIL_USER }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: python monitor.py --batch 2

      - name: Save hashes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hashes.json
          git diff --cached --quiet || git commit -m "Update hashes $(date +%m/%d-%H:%M)"
          git push